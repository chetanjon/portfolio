<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background - cool lavender -->
  <rect width="800" height="450" fill="#E2DDE8"/>

  <!-- Grid pattern -->
  <line x1="100" y1="0" x2="100" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="300" y1="0" x2="300" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="500" y1="0" x2="500" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="700" y1="0" x2="700" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="0" y1="90" x2="800" y2="90" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="0" y1="270" x2="800" y2="270" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>

  <!-- 5-dimension radar/pentagon for Vibe Reports -->
  <polygon points="400,140 478,190 460,280 340,280 322,190" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-width="1.5" stroke-opacity="0.15"/>
  <polygon points="400,170 455,203 443,265 357,265 345,203" fill="#1A1A1A" fill-opacity="0.08" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.12"/>
  <polygon points="400,195 435,215 428,252 372,252 365,215" fill="#1A1A1A" fill-opacity="0.12"/>

  <!-- Axis lines -->
  <line x1="400" y1="130" x2="400" y2="220" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="400" y1="220" x2="485" y2="185" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="400" y1="220" x2="465" y2="285" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="400" y1="220" x2="335" y2="285" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="400" y1="220" x2="315" y2="185" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Dimension dots -->
  <circle cx="400" cy="155" r="4" fill="#1A1A1A" fill-opacity="0.25"/>
  <circle cx="465" cy="198" r="4" fill="#1A1A1A" fill-opacity="0.25"/>
  <circle cx="448" cy="272" r="4" fill="#1A1A1A" fill-opacity="0.25"/>
  <circle cx="352" cy="272" r="4" fill="#1A1A1A" fill-opacity="0.25"/>
  <circle cx="335" cy="198" r="4" fill="#1A1A1A" fill-opacity="0.25"/>

  <!-- Review bars on the side -->
  <rect x="580" y="160" width="140" height="8" rx="4" fill="#1A1A1A" fill-opacity="0.12"/>
  <rect x="580" y="180" width="110" height="8" rx="4" fill="#1A1A1A" fill-opacity="0.10"/>
  <rect x="580" y="200" width="95" height="8" rx="4" fill="#1A1A1A" fill-opacity="0.08"/>
  <rect x="580" y="220" width="70" height="8" rx="4" fill="#1A1A1A" fill-opacity="0.06"/>
  <rect x="580" y="240" width="50" height="8" rx="4" fill="#1A1A1A" fill-opacity="0.05"/>

  <!-- Star ratings hint -->
  <rect x="80" y="180" width="120" height="16" rx="8" fill="#1A1A1A" fill-opacity="0.08"/>
  <rect x="80" y="205" width="100" height="16" rx="8" fill="#1A1A1A" fill-opacity="0.06"/>
  <rect x="80" y="230" width="85" height="16" rx="8" fill="#1A1A1A" fill-opacity="0.05"/>

  <!-- AI sparkle -->
  <circle cx="400" cy="220" r="6" fill="#1A1A1A" fill-opacity="0.2"/>
  <line x1="400" y1="210" x2="400" y2="230" stroke="#1A1A1A" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="390" y1="220" x2="410" y2="220" stroke="#1A1A1A" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Key metric badge -->
  <rect x="52" y="24" width="72" height="32" rx="16" fill="#1A1A1A" fill-opacity="0.85"/>
  <text x="88" y="44" font-family="'Georgia', serif" font-size="12" font-weight="700" fill="#E2DDE8" text-anchor="middle">$0/mo</text>

  <!-- Title -->
  <text x="400" y="400" font-family="'Arial', sans-serif" font-size="32" font-weight="800" fill="#1A1A1A" fill-opacity="0.08" text-anchor="middle" letter-spacing="4">FRICTIONLENS</text>

  <!-- Label -->
  <rect x="620" y="24" width="128" height="28" rx="0" fill="#1A1A1A" fill-opacity="0.08"/>
  <text x="684" y="42" font-family="'Arial', sans-serif" font-size="9" font-weight="600" fill="#1A1A1A" fill-opacity="0.6" text-anchor="middle" letter-spacing="2">AI TOOL</text>

  <!-- Date -->
  <text x="52" y="430" font-family="'Arial', sans-serif" font-size="9" fill="#1A1A1A" fill-opacity="0.35" letter-spacing="2">2026</text>

  <!-- Domain -->
  <text x="748" y="430" font-family="'Arial', sans-serif" font-size="9" fill="#1A1A1A" fill-opacity="0.35" text-anchor="end" letter-spacing="2">VIBE REPORTS</text>
</svg>

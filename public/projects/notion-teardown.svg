<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background - warm off-white -->
  <rect width="800" height="450" fill="#E8E4DF"/>

  <!-- Grid pattern -->
  <line x1="100" y1="0" x2="100" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="300" y1="0" x2="300" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="500" y1="0" x2="500" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="700" y1="0" x2="700" y2="450" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="0" y1="90" x2="800" y2="90" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="0" y1="270" x2="800" y2="270" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.06"/>

  <!-- AARRR funnel visualization -->
  <polygon points="250,120 550,120 520,180 280,180" fill="#1A1A1A" fill-opacity="0.08"/>
  <polygon points="280,185 520,185 500,240 300,240" fill="#1A1A1A" fill-opacity="0.11"/>
  <polygon points="300,245 500,245 480,300 320,300" fill="#1A1A1A" fill-opacity="0.14"/>
  <polygon points="320,305 480,305 460,355 340,355" fill="#1A1A1A" fill-opacity="0.17"/>
  <polygon points="340,360 460,360 440,400 360,400" fill="#1A1A1A" fill-opacity="0.20"/>

  <!-- Funnel labels -->
  <text x="400" y="156" font-family="'Arial', sans-serif" font-size="10" fill="#1A1A1A" fill-opacity="0.4" text-anchor="middle" letter-spacing="3">ACQUISITION</text>
  <text x="400" y="218" font-family="'Arial', sans-serif" font-size="10" fill="#1A1A1A" fill-opacity="0.4" text-anchor="middle" letter-spacing="3">ACTIVATION</text>
  <text x="400" y="278" font-family="'Arial', sans-serif" font-size="10" fill="#1A1A1A" fill-opacity="0.4" text-anchor="middle" letter-spacing="3">RETENTION</text>
  <text x="400" y="336" font-family="'Arial', sans-serif" font-size="10" fill="#1A1A1A" fill-opacity="0.4" text-anchor="middle" letter-spacing="3">REVENUE</text>
  <text x="400" y="390" font-family="'Arial', sans-serif" font-size="10" fill="#1A1A1A" fill-opacity="0.4" text-anchor="middle" letter-spacing="3">REFERRAL</text>

  <!-- Drop-off arrow indicator -->
  <line x1="540" y1="180" x2="580" y2="200" stroke="#1A1A1A" stroke-width="2" stroke-opacity="0.25" stroke-linecap="round"/>
  <circle cx="590" cy="205" r="15" fill="#1A1A1A" fill-opacity="0.1"/>
  <text x="590" y="209" font-family="'Arial', sans-serif" font-size="9" fill="#1A1A1A" fill-opacity="0.5" text-anchor="middle">!</text>

  <!-- Key metric badge -->
  <rect x="52" y="24" width="88" height="32" rx="16" fill="#1A1A1A" fill-opacity="0.85"/>
  <text x="96" y="44" font-family="'Georgia', serif" font-size="11" font-weight="700" fill="#E8E4DF" text-anchor="middle">10,000+</text>

  <!-- Title -->
  <text x="400" y="430" font-family="'Arial', sans-serif" font-size="36" font-weight="800" fill="#1A1A1A" fill-opacity="0.08" text-anchor="middle" letter-spacing="4">NOTION</text>

  <!-- Label -->
  <rect x="620" y="24" width="128" height="28" rx="0" fill="#1A1A1A" fill-opacity="0.08"/>
  <text x="684" y="42" font-family="'Arial', sans-serif" font-size="9" font-weight="600" fill="#1A1A1A" fill-opacity="0.6" text-anchor="middle" letter-spacing="2">TEARDOWN</text>

  <!-- Date -->
  <text x="52" y="430" font-family="'Arial', sans-serif" font-size="9" fill="#1A1A1A" fill-opacity="0.35" letter-spacing="2">2026</text>

  <!-- Domain -->
  <text x="748" y="430" font-family="'Arial', sans-serif" font-size="9" fill="#1A1A1A" fill-opacity="0.35" text-anchor="end" letter-spacing="2">AARRR FUNNEL</text>
</svg>
